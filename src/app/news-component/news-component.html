
<div class="container mt-4">
  <h2>Top Headlines</h2>
  <div class="row">
    <div class="col-md-4" *ngFor="let article of headlines">
      <div class="card mb-3">
        <img *ngIf="article.urlToImage" [src]="article.urlToImage" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">{{ article.title }}</h5>
          <p class="card-text">{{ article.description }}</p>
          <a [href]="article.url" class="btn btn-primary" target="_blank">Read more</a>
        </div>
      </div>
    </div>
  </div>
</div>
